language: python
python:
  - "3.12"

#before_install:

install:
  - pip install -r requirements.txt
  - pip install black flake8 coveralls coverage pytest-django

script:
  # --check: doesn't reformat, just exits with error if code isn't "blackened"
  - black --check .
  # Runs the linter using the rules in your .flake8 file
  - flake8 .
  - coverage run -m pytest
  #- pytest --cov=./ --cov-report=xml
  - coverage report  # This prints the table in your Travis log
  - coverage xml     # This creates the file for Codecov
  - coveralls -v --service=github

deploy:
  provider: elasticbeanstalk
  edge: true
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY
  region: "us-east-2"
  app: "polls"
  env: "polls"
  bucket_name: "elasticbeanstalk-us-east-2-793314585930"
  #bucket_path: "/"
  zip_file: "polls.zip"
  on:
    branch: main

#after_success:
